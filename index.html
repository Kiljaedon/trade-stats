<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<script>(function(){var q=location.search;if(!/[?&]t=/.test(q)){location.replace(location.pathname+'?t='+Date.now());return;}setTimeout(function(){location.replace(location.pathname+'?t='+Date.now());},300000);})();</script>
<title>Trading Bot — Live Performance</title>
<style>
 :root{color-scheme:dark}*{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
   background:#0b0e14;color:#e6e9ef;display:flex;justify-content:center;padding:32px 16px}
 .wrap{width:100%;max-width:780px}
 h2{font-size:1.05rem;margin:30px 0 6px}
 .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
 .card{background:#141925;border:1px solid #222a3a;border-radius:14px;padding:20px}
 .val{font-size:1.9rem;font-weight:700;letter-spacing:-.02em}
 .pos{color:#46d369}.neg{color:#f6685e}
 .lbl{color:#9aa3b8;font-size:.8rem;margin-top:6px;text-transform:uppercase;letter-spacing:.04em}
 table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.92rem}
 th,td{text-align:left;padding:9px 12px;border-bottom:1px solid #1c2230}
 th{color:#9aa3b8;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
 td.r,th.r{text-align:right}
 .tag{font-size:.72rem;padding:2px 9px;border-radius:999px}
 .tag.open{background:#0f2a3a;color:#4aa8e0}
 .tag.closed{background:#1c2230;color:#9aa3b8}
</style></head>
<body><div class="wrap">
 <div class="grid"><div class="card"><div class="val">🟢 LIVE</div><div class="lbl">Status</div></div><div class="card"><div class="val neg">$-0.42</div><div class="lbl">Open P&amp;L</div></div><div class="card"><div class="val">3</div><div class="lbl">Open positions</div></div><div class="card"><div class="val">3</div><div class="lbl">Trades taken</div></div><div class="card"><div class="val">1</div><div class="lbl">Days live</div></div><div class="card"><div class="val">0</div><div class="lbl">Closed trades</div></div></div>
 <h2>Live trades</h2><table><tr><th>#</th><th>Status</th><th class='r'>P&amp;L</th><th>When</th></tr><tr><td>Trade #1</td><td><span class="tag open">● open</span></td><td class='r'><span class="neg">$-0.23 · -1.7%</span></td><td>opened Jun 10</td></tr><tr><td>Trade #2</td><td><span class="tag open">● open</span></td><td class='r'><span class="neg">$-0.26 · -1.9%</span></td><td>opened Jun 10</td></tr><tr><td>Trade #3</td><td><span class="tag open">● open</span></td><td class='r'><span class="pos">$+0.08 · +0.6%</span></td><td>opened Jun 10</td></tr></table>
</div></body></html>
