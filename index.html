<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex"><title>Trading Bot — Live Performance</title>
<style>
 :root{color-scheme:dark}*{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
   background:#0b0e14;color:#e6e9ef;display:flex;justify-content:center;padding:32px 16px}
 .wrap{width:100%;max-width:780px}
 h2{font-size:1.05rem;margin:30px 0 6px}
 .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
 .card{background:#141925;border:1px solid #222a3a;border-radius:14px;padding:20px}
 .val{font-size:1.9rem;font-weight:700;letter-spacing:-.02em}
 .pos{color:#46d369}.neg{color:#f6685e}
 .lbl{color:#9aa3b8;font-size:.8rem;margin-top:6px;text-transform:uppercase;letter-spacing:.04em}
 .alert{background:#3a1620;color:#ff7a7a;border:1px solid #5c2230;border-radius:12px;
   padding:14px 18px;margin-bottom:18px;font-weight:600}
 .clock{background:#141925;border:1px solid #222a3a;border-radius:12px;padding:12px 18px;
   margin-bottom:6px;font-size:.95rem;color:#aeb6c6}
 .clock b{color:#fff;font-weight:700}
 .synced{color:#6b7488;font-size:.8rem;margin-bottom:16px;padding-left:4px}
 .tbox{max-height:230px;overflow-y:auto;margin-top:8px;border:1px solid #222a3a;border-radius:12px}
 table{width:100%;border-collapse:collapse;font-size:.92rem}
 th,td{text-align:left;padding:9px 12px;border-bottom:1px solid #1c2230}
 th{color:#9aa3b8;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;
   position:sticky;top:0;background:#0b0e14}
 td.r,th.r{text-align:right}
 .tag{font-size:.72rem;padding:2px 9px;border-radius:999px}
 .tag.open{background:#0f2a3a;color:#4aa8e0}.tag.closed{background:#1c2230;color:#9aa3b8}
 .tag.queued{background:#3a2e0f;color:#e0b341}
 .log{max-height:140px;overflow-y:auto;margin-top:8px;background:#0f131c;
   border:1px solid #222a3a;border-radius:12px}
 .log .row{display:flex;justify-content:space-between;gap:12px;padding:8px 13px;
   border-bottom:1px solid #161c28;font-size:.88rem}
 .log .when{color:#6b7488;white-space:nowrap}
</style></head>
<body><div class="wrap"><div id="app">loading…</div></div>
<script>
function clockTick(){
 var el=document.getElementById('clock'); if(!el) return;
 function isAct(d){var wd=d.getUTCDay(),mn=d.getUTCHours()*60+d.getUTCMinutes();return wd>=1&&wd<=5&&mn>=720&&mn<=1350;}
 var now=new Date(), active=isAct(now), t;
 if(active){t=new Date(now);t.setUTCHours(22,30,0,0);}
 else{t=new Date(now);t.setUTCHours(12,0,0,0);if(t<=now)t.setUTCDate(t.getUTCDate()+1);
      while(t.getUTCDay()===0||t.getUTCDay()===6)t.setUTCDate(t.getUTCDate()+1);}
 var s=Math.max(0,Math.floor((t-new Date())/1000));
 var d=Math.floor(s/86400);s-=d*86400;var h=Math.floor(s/3600);s-=h*3600;var m=Math.floor(s/60);s-=m*60;
 var cd=(d?d+'d ':'')+h+'h '+m+'m '+s+'s';
 el.innerHTML=active?'🟢 Bot <b>ACTIVE</b> · scanning every 30 min · turns off in <b>'+cd+'</b>'
                    :'⏸️ Bot <b>OFF</b> · starts back up in <b>'+cd+'</b>';
}
function load(){
 fetch('content.html?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.text();})
  .then(function(h){document.getElementById('app').innerHTML=h;clockTick();}).catch(function(){});
}
load(); setInterval(load,20000); setInterval(clockTick,1000);
</script></body></html>
